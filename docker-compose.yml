version: "3.9"

services:
  etl:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
    command: python pipeline_runner.py
    restart: "no"

  traffic-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      # Mount only the data directory — mounting the entire source tree would
      # overwrite the packages installed inside the image by pip.
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      etl:
        condition: service_completed_successfully
    restart: unless-stopped
